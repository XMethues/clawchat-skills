<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">ClawChat logo</title>
  <desc id="desc">An orange square icon with a white chat bubble mascot, two antennae, orange eyes, a light gray lower edge, and a soft shadow.</desc>
  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="120%" height="125%" color-interpolation-filters="sRGB">
      <feDropShadow dx="15" dy="20" stdDeviation="2.4" flood-color="#7C3D10" flood-opacity="0.45"/>
    </filter>
    <radialGradient id="eyeOrange" cx="42%" cy="35%" r="70%">
      <stop offset="0" stop-color="#F58220"/>
      <stop offset="1" stop-color="#D96A1C"/>
