         C423 811 384 842 332 855
         C314 860 305 848 317 835
         C345 804 343 780 325 758
         C224 720 153 630 153 520
         C153 367 313 248 512 248 Z"/>

    <path
      fill="#fff"
      d="M512 248
         C710 248 872 367 872 518
         C872 617 797 693 681 729
         C567 764 421 758 312 710
         C215 667 153 593 153 520
         C153 367 313 248 512 248 Z"/>
  </g>

  <g>
